<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 960" width="1600" height="960">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1423"/>
      <stop offset="100%" stop-color="#121f34"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b283e"/>
      <stop offset="100%" stop-color="#162233"/>
    </linearGradient>
    <linearGradient id="banner" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4c8dff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#4c8dff" stop-opacity="0.03"/>
    </linearGradient>
    <style><![CDATA[
      .t { font-family: "Avenir Next", "Nunito Sans", "Segoe UI", sans-serif; }
      .eyebrow { font-size: 14px; letter-spacing: 2px; fill: #ff8f5d; font-weight: 700; }
      .noteTitle { font-size: 19px; fill: #dbe8fb; font-weight: 700; }
      .noteBody { font-size: 15px; fill: #a7bad5; }
    ]]></style>
  </defs>

  <rect width="1600" height="960" fill="url(#bg)"/>
  <text class="t eyebrow" x="48" y="48">THRESHOLD REDESIGN V4 — HOME DESKTOP</text>

  <!-- App window -->
  <g transform="translate(80 72)">
    <rect width="1000" height="780" rx="12" fill="url(#panel)" stroke="#2e4362"/>

    <!-- TitleBar.tsx — 32px, centred title, linux window controls right -->
    <rect x="0" y="0" width="1000" height="32" rx="12" fill="#17253b"/>
    <rect x="0" y="20" width="1000" height="12" fill="#17253b"/>
    <!-- drag region implied by full bar -->
    <text class="t" x="500" y="22" text-anchor="middle" style="font-size:13px;fill:#8faac8;font-weight:500;">Threshold</text>
    <!-- Linux controls: minimize circle, close circle -->
    <circle cx="952" cy="16" r="8" fill="#2a3f5f"/>
    <text class="t" x="952" y="21" text-anchor="middle" style="font-size:11px;fill:#adc1dd;">−</text>
    <circle cx="978" cy="16" r="8" fill="#2a3f5f"/>
    <text class="t" x="978" y="21" text-anchor="middle" style="font-size:12px;fill:#adc1dd;">✕</text>

    <!-- App title below titlebar -->
    <text class="t" x="36" y="74" style="font-size:32px;fill:#edf4ff;font-weight:700;">Threshold</text>

    <!-- Next alarm banner -->
    <rect x="28" y="90" width="944" height="66" rx="16" fill="url(#banner)" stroke="#4c8dff" stroke-opacity="0.28"/>
    <text class="t" x="52" y="127" style="font-size:22px;fill:#7fb3ff;font-weight:700;">Next alarm in 6h 47m</text>
    <text class="t" x="52" y="149" style="font-size:17px;fill:#8fa8c8;">Scheduled: 6:47 AM tomorrow</text>

    <!-- Alarm row 1 — disabled -->
    <g transform="translate(28 176)">
      <rect width="944" height="96" rx="16" fill="#26354c" stroke="#385072"/>
      <rect x="0" y="14" width="7" height="66" rx="3.5" fill="#6f83a4"/>
      <text class="t" x="24" y="56" style="font-size:40px;fill:#f3f7ff;font-weight:700;letter-spacing:-1px;">22:33</text>
      <text class="t" x="26" y="82" style="font-size:19px;fill:#a9bad1;">Alarm</text>
      <text class="t" x="620" y="52" style="font-size:16px;fill:#7f90a8;">Disabled</text>
      <!-- delete icon -->
      <text class="t" x="818" y="56" text-anchor="middle" style="font-size:20px;fill:#7f90a8;">🗑</text>
      <!-- toggle off -->
      <rect x="854" y="32" width="62" height="32" rx="16" fill="#3b4c66"/>
      <circle cx="870" cy="48" r="13" fill="#d9e1ee"/>
    </g>

    <!-- Alarm row 2 — disabled -->
    <g transform="translate(28 286)">
      <rect width="944" height="96" rx="16" fill="#26354c" stroke="#385072"/>
      <rect x="0" y="14" width="7" height="66" rx="3.5" fill="#6f83a4"/>
      <text class="t" x="24" y="56" style="font-size:36px;fill:#f0f6ff;font-weight:700;letter-spacing:-1px;">02:00 - 02:30</text>
      <text class="t" x="26" y="82" style="font-size:19px;fill:#a9bad1;">Test Alarm</text>
      <text class="t" x="620" y="52" style="font-size:16px;fill:#7f90a8;">Disabled</text>
      <text class="t" x="818" y="56" text-anchor="middle" style="font-size:20px;fill:#7f90a8;">🗑</text>
      <rect x="854" y="32" width="62" height="32" rx="16" fill="#3b4c66"/>
      <circle cx="870" cy="48" r="13" fill="#d9e1ee"/>
    </g>

    <!-- Alarm row 3 — enabled -->
    <g transform="translate(28 396)">
      <rect width="944" height="96" rx="16" fill="#2a3a52" stroke="#3e5679"/>
      <rect x="0" y="14" width="7" height="66" rx="3.5" fill="#4c8dff"/>
      <text class="t" x="24" y="56" style="font-size:40px;fill:#f3f7ff;font-weight:700;letter-spacing:-1px;">09:27</text>
      <text class="t" x="26" y="82" style="font-size:19px;fill:#a9bad1;">Francis!  ⏰ Sun 09:27</text>
      <text class="t" x="620" y="52" style="font-size:16px;fill:#9db4d4;">Enabled</text>
      <text class="t" x="818" y="56" text-anchor="middle" style="font-size:20px;fill:#7f90a8;">🗑</text>
      <!-- toggle on -->
      <rect x="854" y="32" width="62" height="32" rx="16" fill="#4c8dff"/>
      <circle cx="902" cy="48" r="13" fill="#ffffff"/>
    </g>

    <!-- Bottom action zone — full-width bar, add button full width style, gear to right -->
    <rect x="0" y="726" width="1000" height="54" fill="#142132"/>
    <!-- Add Alarm button — full-width style matching screenshot -->
    <rect x="28" y="736" width="900" height="36" rx="8" fill="#4c8dff"/>
    <text class="t" x="478" y="760" text-anchor="middle" style="font-size:17px;fill:#fff;font-weight:700;letter-spacing:1px;">+ ADD ALARM</text>
    <!-- Settings gear beside button — inside the same footer zone -->
    <rect x="936" y="736" width="36" height="36" rx="8" fill="#1f334b" stroke="#345476"/>
    <text class="t" x="954" y="759" text-anchor="middle" style="font-size:18px;fill:#8fb8e8;">⚙</text>
  </g>

  <!-- Annotation: TitleBar -->
  <g transform="translate(1122 130)">
    <rect width="206" height="140" rx="14" fill="#111c2f" stroke="#2e4362"/>
    <text class="t noteTitle" x="14" y="34">TitleBar.tsx</text>
    <text class="t noteBody" x="14" y="58">32px app-drawn bar.</text>
    <text class="t noteBody" x="14" y="78">Centred title, platform</text>
    <text class="t noteBody" x="14" y="98">window controls.</text>
    <text class="t noteBody" x="14" y="118">decorations: false.</text>
  </g>
  <line x1="1122" y1="158" x2="1082" y2="138" stroke="#4f6a8c" stroke-dasharray="4 4"/>

  <!-- Annotation: bottom action zone -->
  <g transform="translate(1122 440)">
    <rect width="206" height="140" rx="14" fill="#111c2f" stroke="#2e4362"/>
    <text class="t noteTitle" x="14" y="34">Footer zone</text>
    <text class="t noteBody" x="14" y="58">Full-width ADD ALARM</text>
    <text class="t noteBody" x="14" y="78">button — existing style.</text>
    <text class="t noteBody" x="14" y="98">Settings ⚙ moves here</text>
    <text class="t noteBody" x="14" y="118">from top-right fixed.</text>
  </g>
  <line x1="1122" y1="510" x2="1082" y2="762" stroke="#4f6a8c" stroke-dasharray="4 4"/>

  <!-- Annotation: accent rail / tokens -->
  <g transform="translate(1122 300)">
    <rect width="206" height="120" rx="14" fill="#111c2f" stroke="#2e4362"/>
    <text class="t noteTitle" x="14" y="34">Theme tokens</text>
    <text class="t noteBody" x="14" y="58">Rail and toggle use</text>
    <text class="t noteBody" x="14" y="78">palette roles only.</text>
    <text class="t noteBody" x="14" y="98">No hardcoded colours.</text>
  </g>
</svg>
