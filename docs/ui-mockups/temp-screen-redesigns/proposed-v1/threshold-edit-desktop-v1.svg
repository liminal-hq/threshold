<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1360 860" width="1360" height="860">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1423"/>
      <stop offset="100%" stop-color="#121f34"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b283e"/>
      <stop offset="100%" stop-color="#162233"/>
    </linearGradient>
    <style><![CDATA[
      .t { font-family: "Avenir Next", "Nunito Sans", "Segoe UI", sans-serif; }
      .h { font-size: 14px; letter-spacing: 2px; fill: #ff8f5d; font-weight: 700; }
      .title { font-size: 34px; fill: #edf4ff; font-weight: 700; }
      .body { font-size: 20px; fill: #a7bad5; }
      .small { font-size: 16px; fill: #7f95b6; }
    ]]></style>
  </defs>

  <rect width="1360" height="860" fill="url(#bg)"/>
  <text class="t h" x="36" y="48">THRESHOLD REDESIGN V1 - EDIT / NEW ALARM DESKTOP</text>

  <rect x="28" y="66" width="1304" height="34" rx="8" fill="#17253b" stroke="#2a3e5c"/>
  <text class="t small" x="56" y="89">Threshold</text>

  <g transform="translate(120 130)">
    <rect width="1120" height="650" rx="28" fill="url(#panel)" stroke="#2e4362"/>
    <text class="t title" x="36" y="58">Edit Alarm</text>
    <text class="t body" x="36" y="88">Desktop keeps structure, with wider spacing and persistent footer actions</text>

    <g transform="translate(36 120)">
      <rect width="690" height="446" rx="22" fill="#223148" stroke="#365073"/>

      <rect x="24" y="24" width="280" height="46" rx="14" fill="#2b3f5f"/>
      <rect x="28" y="28" width="136" height="38" rx="12" fill="#ff7a3d"/>
      <text class="t" x="96" y="53" text-anchor="middle" style="font-size:18px;fill:#fff;font-weight:700;">Fixed Time</text>
      <text class="t" x="232" y="53" text-anchor="middle" style="font-size:18px;fill:#9bb1d0;">Window</text>

      <text class="t body" x="24" y="108">Time</text>
      <rect x="24" y="118" width="300" height="78" rx="14" fill="#1c2b41" stroke="#324a6b"/>
      <text class="t" x="174" y="169" text-anchor="middle" style="font-size:46px;fill:#f4f8ff;font-weight:700;">07:00</text>

      <text class="t body" x="24" y="242">Label</text>
      <rect x="24" y="252" width="642" height="56" rx="12" fill="#1c2b41" stroke="#324a6b"/>
      <text class="t" x="42" y="287" style="font-size:20px;fill:#95abc9;">Alarm Label (e.g. Wake Up)</text>

      <text class="t body" x="24" y="342">Repeats</text>
      <g transform="translate(24 354)">
        <circle cx="20" cy="20" r="17" fill="#ff7a3d"/><text class="t" x="20" y="26" text-anchor="middle" style="font-size:14px;fill:#fff;font-weight:700;">M</text>
        <circle cx="60" cy="20" r="17" fill="#ff7a3d"/><text class="t" x="60" y="26" text-anchor="middle" style="font-size:14px;fill:#fff;font-weight:700;">T</text>
        <circle cx="100" cy="20" r="17" fill="#ff7a3d"/><text class="t" x="100" y="26" text-anchor="middle" style="font-size:14px;fill:#fff;font-weight:700;">W</text>
        <circle cx="140" cy="20" r="17" fill="#ff7a3d"/><text class="t" x="140" y="26" text-anchor="middle" style="font-size:14px;fill:#fff;font-weight:700;">T</text>
        <circle cx="180" cy="20" r="17" fill="#ff7a3d"/><text class="t" x="180" y="26" text-anchor="middle" style="font-size:14px;fill:#fff;font-weight:700;">F</text>
        <circle cx="220" cy="20" r="17" fill="#324764"/><text class="t" x="220" y="26" text-anchor="middle" style="font-size:14px;fill:#b2c5dc;">S</text>
        <circle cx="260" cy="20" r="17" fill="#324764"/><text class="t" x="260" y="26" text-anchor="middle" style="font-size:14px;fill:#b2c5dc;">S</text>
      </g>

      <text class="t body" x="360" y="108">Sound</text>
      <rect x="360" y="118" width="306" height="78" rx="14" fill="#1c2b41" stroke="#324a6b"/>
      <text class="t" x="378" y="166" style="font-size:21px;fill:#e3edfc;">Ambient Drone</text>

      <text class="t body" x="360" y="242">Preview</text>
      <rect x="360" y="252" width="306" height="102" rx="14" fill="#1a273b" stroke="#2f4564"/>
      <text class="t" x="378" y="292" style="font-size:24px;fill:#f0f6ff;font-weight:700;">07:00</text>
      <text class="t" x="378" y="322" style="font-size:18px;fill:#9fb5d4;">Mon Tue Wed Thu Fri</text>
    </g>

    <g transform="translate(756 120)">
      <rect width="328" height="446" rx="22" fill="#1a273b" stroke="#2f4564"/>
      <text class="t" x="20" y="42" style="font-size:26px;fill:#deebfd;font-weight:700;">Interaction notes</text>
      <text class="t body" x="20" y="82">- Keep existing logic paths</text>
      <text class="t body" x="20" y="112">- Preserve keyboard focus order</text>
      <text class="t body" x="20" y="142">- Keep validation unchanged</text>
      <text class="t body" x="20" y="172">- Visual refresh only in phase 1</text>
      <rect x="20" y="208" width="288" height="106" rx="14" fill="#22324a" stroke="#355175"/>
      <text class="t" x="38" y="246" style="font-size:18px;fill:#dce9fb;font-weight:700;">Token usage</text>
      <text class="t small" x="38" y="272">primary / secondary</text>
      <text class="t small" x="38" y="294">background / paper / divider</text>
      <text class="t small" x="38" y="316">text.primary / text.secondary</text>
    </g>

    <rect x="0" y="592" width="1120" height="58" fill="#142132"/>
    <rect x="842" y="604" width="120" height="34" rx="10" fill="#30445f"/>
    <text class="t" x="902" y="626" text-anchor="middle" style="font-size:18px;fill:#d2dded;">Cancel</text>
    <rect x="972" y="604" width="120" height="34" rx="10" fill="#ff7a3d"/>
    <text class="t" x="1032" y="626" text-anchor="middle" style="font-size:18px;fill:#fff;font-weight:700;">Save Alarm</text>
  </g>
</svg>
