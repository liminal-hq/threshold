<svg viewBox="0 0 384 384" xmlns="http://www.w3.org/2000/svg" width="384" height="384">
<defs>
  <clipPath id="wc"><circle cx="192.0" cy="192.0" r="192.0"/></clipPath>
  <!-- Material You purple gradient background -->
  <linearGradient id="material-bg" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#9c4dcc"/>
    <stop offset="100%" stop-color="#7b1fa2"/>
  </linearGradient>
  <!-- Liminal horizon glow -->
  <radialGradient id="liminal-horizon">
    <stop offset="0%" stop-color="#ffb74d" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#7b1fa2" stop-opacity="0"/>
  </radialGradient>
  <!-- Threshold dot pattern -->
  <pattern id="threshold-dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.12"/>
  </pattern>
  <!-- Vignette for round watch -->
  <radialGradient id="vig">
    <stop offset="55%" stop-color="#7b1fa2" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.85"/>
  </radialGradient>
  <!-- Material glow effect -->
  <filter id="material-glow">
    <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
    <feMerge>
      <feMergeNode in="coloredBlur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <filter id="bloom" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="12"/>
  </filter>
</defs>
<g clip-path="url(#wc)">
<!-- Material gradient base -->
<rect width="384" height="384" fill="url(#material-bg)"/>
<!-- Liminal horizon glow at bottom of watch face -->
<circle cx="192.0" cy="340" r="200" fill="url(#liminal-horizon)"/>
<!-- Threshold dot pattern overlay -->
<rect width="384" height="384" fill="url(#threshold-dots)"/>

<!-- Breathing pulse rings -->
<circle cx="192.0" cy="142.0" r="70" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.15">
  <animate attributeName="r" values="70;85;70" dur="4s" begin="0s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.15;0.08;0.15" dur="4s" begin="0s" repeatCount="indefinite"/>
</circle>
<circle cx="192.0" cy="142.0" r="90" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2">
  <animate attributeName="r" values="90;105;90" dur="4s" begin="1s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.2;0.08;0.2" dur="4s" begin="1s" repeatCount="indefinite"/>
</circle>
<circle cx="192.0" cy="142.0" r="110" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.1">
  <animate attributeName="r" values="110;125;110" dur="4s" begin="2s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.1;0.05;0.1" dur="4s" begin="2s" repeatCount="indefinite"/>
</circle>

<!-- Time display with Material glow -->
<g filter="url(#material-glow)">
  <text x="192.0" y="152.0" text-anchor="middle" font-family="Roboto, Inter, system-ui, sans-serif" font-size="68" font-weight="300" fill="#ffffff" opacity="0.95" letter-spacing="-1px">7:22</text>
</g>
<!-- Bloom duplicate for extra glow -->
<text x="192.0" y="152.0" text-anchor="middle" font-family="Roboto, Inter, system-ui, sans-serif" font-size="68" font-weight="300" fill="#ffffff" opacity="0.05" letter-spacing="-1px" filter="url(#bloom)">7:22</text>

<!-- Alarm label -->
<text x="192.0" y="176.0" text-anchor="middle" font-family="Roboto, Inter, system-ui, sans-serif" font-size="14" fill="#ffffff" opacity="0.95" font-weight="400">Wake up, Scott 🌅!</text>

<!-- Threshold indicator line and animated dot -->
<line x1="162.0" y1="200.0" x2="222.0" y2="200.0" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
<!-- Sleep endpoint -->
<circle cx="162.0" cy="200.0" r="3" fill="#ffffff" opacity="0.4"/>
<!-- Wake endpoint -->
<circle cx="222.0" cy="200.0" r="3" fill="#ffffff" opacity="0.3"/>
<!-- Current position (threshold dot) -->
<circle cx="192.0" cy="200.0" r="4" fill="#ffb74d" opacity="0.9">
  <animate attributeName="opacity" values="0.9;0.5;0.9" dur="2s" repeatCount="indefinite"/>
</circle>
<circle cx="192.0" cy="200.0" r="7" fill="none" stroke="#ffb74d" stroke-width="1.5" opacity="0.4">
  <animate attributeName="r" values="7;11;7" dur="2s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite"/>
</circle>

<!-- Standard Wear OS buttons (Option A) -->
<!-- Stop button - Material dark rounded pill -->
<rect x="62" y="260" width="260" height="48" rx="24" fill="#1a1a2e" opacity="0.9"/>
<!-- Subtle inner highlight -->
<rect x="64" y="262" width="256" height="22" rx="22" fill="#ffffff" opacity="0.04"/>
<text x="192" y="288" text-anchor="middle" dominant-baseline="central" font-family="Roboto, Inter, system-ui, sans-serif" font-size="17" fill="#ffffff" opacity="0.95" font-weight="600" letter-spacing="0.5">Stop Alarm</text>

<!-- Snooze button - ghost outline pill -->
<rect x="72" y="320" width="240" height="44" rx="22" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
<text x="192" y="345" text-anchor="middle" dominant-baseline="central" font-family="Roboto, Inter, system-ui, sans-serif" font-size="15" fill="#ffffff" opacity="0.9" font-weight="500" letter-spacing="0.5">Snooze (10m)</text>

<!-- Vignette overlay for round watch depth -->
<rect width="384" height="384" fill="url(#vig)"/>
</g>
</svg>
