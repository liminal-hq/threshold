<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#162840"/>
    </linearGradient>
    <!-- Theme gradients -->
    <linearGradient id="winterGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b0c9e8"/>
      <stop offset="100%" stop-color="#e8f4ff"/>
    </linearGradient>
    <linearGradient id="bayGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#006994"/>
      <stop offset="100%" stop-color="#1de9b6"/>
    </linearGradient>
    <linearGradient id="nightGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="materialYou" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="50%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#2196F3"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="420" fill="url(#bg3)"/>
  <pattern id="dots3" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="1" fill="#ffffff" fill-opacity="0.04"/>
  </pattern>
  <rect width="600" height="420" fill="url(#dots3)"/>

  <text x="30" y="38" font-size="10" fill="#FF7043" letter-spacing="3" font-weight="600">03 — CALMING COLOURS &amp; THEMING</text>

  <!-- === PRIMARY PALETTE === -->
  <text x="30" y="72" font-size="9" fill="#4a6a80" letter-spacing="2">CORE PALETTE</text>

  <!-- Deep Night Blue swatch -->
  <rect x="30" y="82" width="100" height="70" rx="12" fill="#162840" stroke="#2a5080" stroke-width="1.5"/>
  <text x="80" y="138" font-size="8" fill="#7ca0bf" text-anchor="middle">#162840</text>
  <text x="80" y="108" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="600">Deep</text>
  <text x="80" y="120" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="600">Night Blue</text>

  <!-- Vibrant Orange swatch -->
  <rect x="144" y="82" width="100" height="70" rx="12" fill="#FF7043" filter="url(#glow3)"/>
  <text x="194" y="138" font-size="8" fill="#fff" text-anchor="middle" opacity="0.8">#FF7043</text>
  <text x="194" y="108" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="600">Vibrant</text>
  <text x="194" y="120" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="600">Orange</text>
  <text x="194" y="155" font-size="8" fill="#FF7043" text-anchor="middle">Actions only</text>

  <!-- Surface swatch -->
  <rect x="258" y="82" width="80" height="70" rx="12" fill="#1e3a5f" stroke="#2a5080" stroke-width="1"/>
  <text x="298" y="138" font-size="8" fill="#7ca0bf" text-anchor="middle">#1e3a5f</text>
  <text x="298" y="115" font-size="10" fill="#a0c0df" text-anchor="middle" font-weight="500">Surface</text>

  <!-- Text colours -->
  <rect x="352" y="82" width="60" height="30" rx="8" fill="#ffffff"/>
  <text x="382" y="103" font-size="9" fill="#162840" text-anchor="middle" font-weight="600">Primary</text>
  <rect x="352" y="118" width="60" height="30" rx="8" fill="#7ca0bf"/>
  <text x="382" y="139" font-size="9" fill="#0d1b2a" text-anchor="middle">Secondary</text>
  <rect x="352" y="154" width="60" height="14" rx="7" fill="#4a6a80"/>
  <text x="382" y="164" font-size="7" fill="#a0c0df" text-anchor="middle">Disabled</text>

  <!-- Usage annotation -->
  <line x1="144" y1="117" x2="134" y2="117" stroke="#FF7043" stroke-width="1" stroke-dasharray="2,2" opacity="0.7"/>
  <text x="132" y="120" font-size="7" fill="#FF7043" text-anchor="end">accent</text>

  <!-- === MATERIAL YOU section === -->
  <line x1="30" y1="186" x2="570" y2="186" stroke="#1e3a5f" stroke-width="1"/>

  <text x="30" y="206" font-size="9" fill="#4a6a80" letter-spacing="2">MATERIAL YOU · DYNAMIC THEMING</text>

  <!-- Wallpaper source -->
  <g transform="translate(30, 218)">
    <!-- "Wallpaper" abstract colour blob -->
    <rect width="90" height="60" rx="10" fill="#0a1929" stroke="#1e3a5f" stroke-width="1"/>
    <!-- Abstract landscape: sky/water/trees -->
    <rect x="0" y="0" width="90" height="30" rx="10" fill="#3a7bd5" opacity="0.7"/>
    <rect x="0" y="30" width="90" height="30" rx="10" fill="#1de9b6" opacity="0.5"/>
    <rect x="0" y="30" width="90" height="30" fill="#1de9b6" opacity="0.3"/>
    <!-- Trees silhouette -->
    <polygon points="20,30 28,15 36,30" fill="#0a1929" opacity="0.6"/>
    <polygon points="50,30 60,12 70,30" fill="#0a1929" opacity="0.6"/>
    <text x="45" y="75" font-size="8" fill="#4a6a80" text-anchor="middle">Wallpaper</text>
  </g>

  <!-- Arrow -->
  <text x="140" y="254" font-size="16" fill="#FF7043" opacity="0.6">→</text>

  <!-- Material You algo pill -->
  <g transform="translate(162, 222)">
    <rect width="80" height="52" rx="26" fill="url(#materialYou)" opacity="0.2" stroke="#FF7043" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="40" y="23" font-size="8" fill="#ffffff" text-anchor="middle" opacity="0.9">Material</text>
    <text x="40" y="35" font-size="8" fill="#ffffff" text-anchor="middle" opacity="0.9">You</text>
    <text x="40" y="46" font-size="7" fill="#FF7043" text-anchor="middle">tonal system</text>
  </g>

  <!-- Arrow -->
  <text x="253" y="254" font-size="16" fill="#FF7043" opacity="0.6">→</text>

  <!-- Dynamic UI result -->
  <g transform="translate(278, 218)">
    <rect width="90" height="60" rx="10" fill="#163a5a" stroke="#1de9b6" stroke-width="1.5"/>
    <rect x="10" y="12" width="70" height="16" rx="8" fill="#1de9b6" opacity="0.25"/>
    <text x="45" y="23" font-size="7" fill="#1de9b6" text-anchor="middle">adapted accent</text>
    <rect x="10" y="34" width="50" height="10" rx="5" fill="#1de9b6" opacity="0.6"/>
    <text x="45" y="75" font-size="8" fill="#4a6a80" text-anchor="middle">UI adapts</text>
  </g>

  <!-- === CUSTOM THEMES === -->
  <line x1="30" y1="308" x2="570" y2="308" stroke="#1e3a5f" stroke-width="1"/>
  <text x="30" y="328" font-size="9" fill="#4a6a80" letter-spacing="2">ATMOSPHERIC CUSTOM THEMES</text>

  <!-- Theme 1: canadian-cottage-winter -->
  <g transform="translate(30, 340)">
    <rect width="160" height="44" rx="10" fill="url(#winterGrad)"/>
    <!-- Snow dots -->
    <circle cx="20" cy="15" r="3" fill="#ffffff" opacity="0.7"/>
    <circle cx="40" cy="22" r="2" fill="#ffffff" opacity="0.5"/>
    <circle cx="60" cy="12" r="2.5" fill="#ffffff" opacity="0.6"/>
    <circle cx="80" cy="20" r="2" fill="#ffffff" opacity="0.4"/>
    <circle cx="100" cy="14" r="3" fill="#ffffff" opacity="0.65"/>
    <circle cx="130" cy="20" r="2" fill="#ffffff" opacity="0.5"/>
    <!-- Cabin silhouette -->
    <polygon points="65,44 65,28 80,18 95,28 95,44" fill="#8b5e3c" opacity="0.6"/>
    <rect x="72" y="32" width="16" height="12" fill="#6b4423" opacity="0.7"/>
    <!-- Chimney smoke -->
    <path d="M80,18 Q76,10 80,4 Q84,10 80,18" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
    <text x="80" y="56" font-size="7.5" fill="#7ca0bf" text-anchor="middle" font-style="italic">canadian-cottage-winter</text>
  </g>

  <!-- Theme 2: georgian-bay-plunge -->
  <g transform="translate(210, 340)">
    <rect width="160" height="44" rx="10" fill="url(#bayGrad)"/>
    <!-- Water ripples -->
    <ellipse cx="80" cy="35" rx="60" ry="6" fill="#ffffff" opacity="0.1"/>
    <ellipse cx="80" cy="30" rx="45" ry="4" fill="#ffffff" opacity="0.1"/>
    <!-- Dock -->
    <rect x="60" y="20" width="40" height="4" fill="#5d4037" opacity="0.7"/>
    <rect x="70" y="24" width="4" height="20" fill="#5d4037" opacity="0.6"/>
    <rect x="86" y="24" width="4" height="20" fill="#5d4037" opacity="0.6"/>
    <!-- Horizon line -->
    <line x1="0" y1="22" x2="160" y2="22" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <text x="80" y="56" font-size="7.5" fill="#e0f7fa" text-anchor="middle" font-style="italic">georgian-bay-plunge</text>
  </g>

  <!-- Theme 3: night (default) -->
  <g transform="translate(390, 340)">
    <rect width="160" height="44" rx="10" fill="url(#nightGrad)" stroke="#2a5080" stroke-width="1"/>
    <!-- Stars -->
    <circle cx="20" cy="10" r="1" fill="#ffffff" opacity="0.8"/>
    <circle cx="50" cy="6" r="1.5" fill="#ffffff" opacity="0.7"/>
    <circle cx="80" cy="14" r="1" fill="#ffffff" opacity="0.9"/>
    <circle cx="110" cy="8" r="1" fill="#ffffff" opacity="0.6"/>
    <circle cx="140" cy="12" r="1.5" fill="#ffffff" opacity="0.75"/>
    <circle cx="35" cy="22" r="0.8" fill="#ffffff" opacity="0.5"/>
    <circle cx="95" cy="18" r="0.8" fill="#ffffff" opacity="0.6"/>
    <circle cx="125" cy="25" r="1" fill="#ffffff" opacity="0.5"/>
    <!-- Moon -->
    <circle cx="130" cy="10" r="7" fill="#f5f0e0" opacity="0.3"/>
    <circle cx="133" cy="8" r="5" fill="url(#nightGrad)" opacity="0.9"/>
    <!-- Horizon city glow -->
    <rect x="0" y="32" width="160" height="12" rx="10" fill="#FF7043" opacity="0.08"/>
    <text x="80" y="56" font-size="7.5" fill="#7ca0bf" text-anchor="middle" font-style="italic">deep-night · default</text>
  </g>

  <!-- Bottom rule -->
  <line x1="30" y1="388" x2="570" y2="388" stroke="#2a4060" stroke-width="1"/>
  <text x="30" y="408" font-size="10" fill="#4a6a80">Threshold · Liminal HQ</text>
  <text x="570" y="408" font-size="10" fill="#4a6a80" text-anchor="end">Nature-inspired, system-aware</text>
</svg>
