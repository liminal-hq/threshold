<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" width="600" height="520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c3d60"/>
      <stop offset="100%" stop-color="#142d48"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#183354"/>
      <stop offset="100%" stop-color="#102640"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2035"/>
      <stop offset="100%" stop-color="#09182a"/>
    </linearGradient>
    <linearGradient id="fab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8a65"/>
      <stop offset="100%" stop-color="#e64a19"/>
    </linearGradient>
    <linearGradient id="nextAlarm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF7043" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF7043" stop-opacity="0"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="fabGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="phoneShadow">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="600" height="520" fill="url(#bg)"/>
  <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.8" fill="#fff" fill-opacity="0.028"/>
  </pattern>
  <rect width="600" height="520" fill="url(#grid)"/>

  <text x="300" y="42" font-size="10" fill="#FF7043" letter-spacing="4" text-anchor="middle" font-weight="600">ALARM LIST · HOME SCREEN · THRESHOLD</text>
  <line x1="60" y1="54" x2="540" y2="54" stroke="#1e3a5f" stroke-width="1"/>

  
  <g transform="translate(162, 72)" filter="url(#phoneShadow)">
    <rect width="276" height="416" rx="36" fill="#0a1420" stroke="#141f2e" stroke-width="1.5"/>
    <rect x="96" y="12" width="84" height="14" rx="7" fill="#060c12"/>
    <rect x="10" y="10" width="256" height="396" rx="28" fill="#0c1827"/>

    
    <text x="24" y="40" font-size="9" fill="#fff" opacity="0.35">9:07</text>
    <text x="232" y="40" font-size="9" fill="#fff" opacity="0.3" text-anchor="end">●●● ▲</text>

    
    <text x="24" y="68" font-size="18" fill="#ffffff" font-weight="700" opacity="0.95">Alarms</text>
    
    <circle cx="220" cy="60" r="12" fill="#0f2035"/>
    <text x="220" y="64" font-size="12" fill="#4a6a80" text-anchor="middle">⚙</text>

    
    <rect x="16" y="80" width="224" height="38" rx="16" fill="url(#nextAlarm)" stroke="#FF7043" stroke-width="0.75" stroke-opacity="0.4"/>
    <circle cx="36" cy="99" r="8" fill="#FF7043" opacity="0.2"/>
    <text x="36" y="103" font-size="10" fill="#FF7043" text-anchor="middle">⏰</text>
    <text x="52" y="96" font-size="9" fill="#FF7043" font-weight="600">Next alarm in 6h 47m</text>
    <text x="52" y="109" font-size="8" fill="#7ca0bf">Scheduled: 6:47 AM tomorrow</text>

    
    <g transform="translate(16, 128)" filter="url(#cardShadow)">
      <rect width="224" height="82" rx="20" fill="url(#card1)" stroke="#2a5f8a" stroke-width="1"/>
      
      <rect width="4" height="52" x="0" y="15" rx="2" fill="#FF7043"/>
      
      <rect x="14" y="12" width="80" height="16" rx="8" fill="#FF7043" opacity="0.15"/>
      <text x="54" y="23" font-size="8.5" fill="#FF7043" text-anchor="middle" font-weight="600">Morning Gentle</text>
      
      <text x="14" y="52" font-size="28" fill="#ffffff" font-weight="700" letter-spacing="-1">7:00</text>
      <text x="14" y="66" font-size="8" fill="#7ca0bf">± 30 min  ·  Mon – Fri</text>
      
      <rect x="178" y="32" width="36" height="20" rx="10" fill="#FF7043"/>
      <circle cx="204" cy="42" r="8" fill="#ffffff"/>
      
      <text x="178" y="22" font-size="7" fill="#FF7043" text-anchor="middle" opacity="0.8">Active</text>
    </g>

    
    <g transform="translate(16, 220)" filter="url(#cardShadow)" opacity="0.85">
      <rect width="224" height="72" rx="20" fill="url(#card2)" stroke="#1f3d5c" stroke-width="1"/>
      <rect width="4" height="44" x="0" y="14" rx="2" fill="#FF7043"/>
      <rect x="14" y="10" width="90" height="15" rx="7.5" fill="#0f2035"/>
      <text x="59" y="21" font-size="8" fill="#4a6a80" text-anchor="middle">Weekend Wind-down</text>
      <text x="14" y="48" font-size="24" fill="#a0c0df" font-weight="600" letter-spacing="-1">8:30</text>
      <text x="14" y="62" font-size="8" fill="#4a6a80">± 20 min  ·  Sat – Sun</text>
      
      <rect x="178" y="26" width="36" height="20" rx="10" fill="#FF7043" opacity="0.8"/>
      <circle cx="204" cy="36" r="8" fill="#ffffff"/>
    </g>

    
    <g transform="translate(16, 302)" filter="url(#cardShadow)" opacity="0.5">
      <rect width="224" height="60" rx="20" fill="url(#card3)" stroke="#152438" stroke-width="1"/>
      <rect width="4" height="36" x="0" y="12" rx="2" fill="#2a4a6a"/>
      <text x="14" y="35" font-size="20" fill="#4a6a80" font-weight="600" letter-spacing="-1">9:15</text>
      <text x="14" y="50" font-size="8" fill="#2a3a4a">Disabled  ·  Daily</text>
      
      <rect x="178" y="20" width="36" height="20" rx="10" fill="#162636"/>
      <circle cx="188" cy="30" r="8" fill="#2a4060"/>
    </g>

    
    <circle cx="204" cy="372" r="26" fill="url(#fab)" filter="url(#fabGlow)"/>
    <text x="204" y="376" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="300">+</text>

    
    <rect x="10" y="376" width="256" height="30" rx="14" fill="#060d16"/>
    
    <rect x="20" y="380" width="70" height="22" rx="11" fill="#0f2035"/>
    <text x="55" y="395" font-size="8.5" fill="#FF7043" text-anchor="middle" font-weight="600">⏰ Alarms</text>
    
    <text x="138" y="395" font-size="8.5" fill="#2a4a6a" text-anchor="middle">📊 Stats</text>
    
    <text x="215" y="395" font-size="8.5" fill="#2a4a6a" text-anchor="middle">⚙ Settings</text>

    
    <rect x="98" y="408" width="80" height="3" rx="1.5" fill="#fff" opacity="0.12"/>
  </g>

  

  
  <g transform="translate(22, 142)">
    <rect width="126" height="56" rx="12" fill="#0a1929" stroke="#1e3a5f" stroke-width="1"/>
    <text x="12" y="18" font-size="8.5" fill="#a0c0df" font-weight="600">Next alarm banner</text>
    <text x="12" y="31" font-size="8" fill="#4a6a80">Shows actual scheduled</text>
    <text x="12" y="42" font-size="8" fill="#4a6a80">time (post-random pick),</text>
    <text x="12" y="53" font-size="8" fill="#4a6a80">not the target window.</text>
  </g>
  <line x1="148" y1="162" x2="162" y2="158" stroke="#2a4060" stroke-width="1" stroke-dasharray="3,2"/>

  
  <g transform="translate(22, 228)">
    <rect width="126" height="56" rx="12" fill="#0a1929" stroke="#1e3a5f" stroke-width="1"/>
    <text x="12" y="18" font-size="8.5" fill="#a0c0df" font-weight="600">Left accent bar</text>
    <text x="12" y="31" font-size="8" fill="#4a6a80">Orange = active,</text>
    <text x="12" y="42" font-size="8" fill="#4a6a80">muted = off.</text>
    <text x="12" y="53" font-size="8" fill="#4a6a80">Instant status read.</text>
  </g>
  <line x1="148" y1="248" x2="162" y2="248" stroke="#2a4060" stroke-width="1" stroke-dasharray="3,2"/>

  
  <g transform="translate(452, 155)">
    <rect width="118" height="68" rx="12" fill="#0a1929" stroke="#1e3a5f" stroke-width="1"/>
    <text x="12" y="18" font-size="8.5" fill="#a0c0df" font-weight="600">Swipe to delete</text>
    <text x="12" y="31" font-size="8" fill="#4a6a80">Rubber-band spring</text>
    <text x="12" y="42" font-size="8" fill="#4a6a80">physics on each</text>
    <text x="12" y="53" font-size="8" fill="#4a6a80">card. Undo toast</text>
    <text x="12" y="64" font-size="8" fill="#4a6a80">follows dismiss.</text>
  </g>
  <line x1="452" y1="186" x2="438" y2="192" stroke="#2a4060" stroke-width="1" stroke-dasharray="3,2"/>

  
  <g transform="translate(452, 255)">
    <rect width="118" height="68" rx="12" fill="#0a1929" stroke="#1e3a5f" stroke-width="1"/>
    <text x="12" y="18" font-size="8.5" fill="#a0c0df" font-weight="600">Depth via opacity</text>
    <text x="12" y="31" font-size="8" fill="#4a6a80">Active cards rise.</text>
    <text x="12" y="42" font-size="8" fill="#4a6a80">Disabled cards fade.</text>
    <text x="12" y="53" font-size="8" fill="#4a6a80">No heavy shadows —</text>
    <text x="12" y="64" font-size="8" fill="#4a6a80">alpha does the work.</text>
  </g>
  <line x1="452" y1="270" x2="438" y2="280" stroke="#2a4060" stroke-width="1" stroke-dasharray="3,2"/>

  
  <g transform="translate(452, 355)">
    <rect width="118" height="56" rx="12" fill="#0a1929" stroke="#1e3a5f" stroke-width="1"/>
    <text x="12" y="18" font-size="8.5" fill="#a0c0df" font-weight="600">FAB placement</text>
    <text x="12" y="31" font-size="8" fill="#4a6a80">Add action floats</text>
    <text x="12" y="42" font-size="8" fill="#4a6a80">over list — always</text>
    <text x="12" y="53" font-size="8" fill="#4a6a80">one thumb-reach away.</text>
  </g>
  <line x1="452" y1="375" x2="438" y2="378" stroke="#2a4060" stroke-width="1" stroke-dasharray="3,2"/>

  <line x1="40" y1="500" x2="560" y2="500" stroke="#1e3a5f" stroke-width="1"/>
  <text x="40" y="516" font-size="9" fill="#2a4a6a">Threshold · Liminal HQ</text>
  <text x="560" y="516" font-size="9" fill="#2a4a6a" text-anchor="end">Glanceable at every hour</text>
</svg>
