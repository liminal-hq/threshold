<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 960" width="1600" height="960">
  <defs>
    <linearGradient id="osbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0e131f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b283e"/>
      <stop offset="100%" stop-color="#162233"/>
    </linearGradient>
    <linearGradient id="banner" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4c8dff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#4c8dff" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="winShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <style><![CDATA[
      .t { font-family: "Avenir Next", "Nunito Sans", "Segoe UI", sans-serif; }
      .eyebrow { font-size: 14px; letter-spacing: 2px; fill: #ff8f5d; font-weight: 700; }
      .noteTitle { font-size: 19px; fill: #dbe8fb; font-weight: 700; }
      .noteBody { font-size: 15px; fill: #a7bad5; }
    ]]></style>
  </defs>

  <!-- OS desktop background -->
  <rect width="1600" height="960" fill="url(#osbg)"/>
  <text class="t eyebrow" x="48" y="48">THRESHOLD — DESKTOP WINDOW CONTEXT (OS VIEW)</text>

  <!-- Simulated OS taskbar at bottom -->
  <rect x="0" y="910" width="1600" height="50" fill="#0d1220"/>
  <!-- Taskbar app entry: active window tab -->
  <rect x="620" y="918" width="180" height="32" rx="6" fill="#223148" stroke="#4c8dff" stroke-width="1.5"/>
  <text class="t" x="630" y="939" style="font-size:13px;fill:#8faac8;">⏰</text>
  <text class="t" x="650" y="939" style="font-size:13px;fill:#c5d8f0;font-weight:600;">Threshold</text>
  <!-- Other generic taskbar slots -->
  <rect x="30" y="922" width="28" height="28" rx="5" fill="#1a2a3d"/>
  <rect x="66" y="922" width="28" height="28" rx="5" fill="#1a2a3d"/>
  <rect x="102" y="922" width="28" height="28" rx="5" fill="#1a2a3d"/>
  <!-- Clock area -->
  <text class="t" x="1540" y="939" text-anchor="end" style="font-size:13px;fill:#6f88a9;">02:54</text>

  <!-- App window — wider AR matching "potential new window shape" screenshot -->
  <g transform="translate(250 80)" filter="url(#winShadow)">
    <rect width="1100" height="790" rx="10" fill="url(#panel)" stroke="#2e4362" stroke-width="1"/>

    <!-- TitleBar.tsx — 32px, Linux layout: centred title, controls right -->
    <rect x="0" y="0" width="1100" height="32" rx="10" fill="#17253b"/>
    <rect x="0" y="22" width="1100" height="10" fill="#17253b"/>
    <!-- drag region = full bar minus controls -->
    <text class="t" x="550" y="22" text-anchor="middle" style="font-size:13px;fill:#8faac8;font-weight:500;">Threshold</text>
    <!-- Linux Adwaita-style controls: minimize + close, circular, right side -->
    <circle cx="1048" cy="16" r="10" fill="#2a3f5f"/>
    <text class="t" x="1048" y="21" text-anchor="middle" style="font-size:12px;fill:#adc1dd;">−</text>
    <circle cx="1078" cy="16" r="10" fill="#2a3f5f"/>
    <text class="t" x="1078" y="21" text-anchor="middle" style="font-size:13px;fill:#adc1dd;">✕</text>

    <!-- App title -->
    <text class="t" x="36" y="76" style="font-size:32px;fill:#edf4ff;font-weight:700;">Threshold</text>

    <!-- Next alarm banner -->
    <rect x="28" y="92" width="1044" height="58" rx="14" fill="url(#banner)" stroke="#4c8dff" stroke-opacity="0.28"/>
    <text class="t" x="52" y="126" style="font-size:20px;fill:#7fb3ff;font-weight:700;">Next alarm in 6h 47m  ·  Scheduled: 6:47 AM tomorrow</text>

    <!-- Alarm row 1 — disabled: time + label, no status text -->
    <g transform="translate(28 166)">
      <rect width="1044" height="88" rx="14" fill="#26354c" stroke="#385072"/>
      <rect x="0" y="12" width="7" height="62" rx="3.5" fill="#6f83a4"/>
      <text class="t" x="24" y="52" style="font-size:36px;fill:#f3f7ff;font-weight:700;letter-spacing:-1px;">22:33</text>
      <text class="t" x="26" y="76" style="font-size:18px;fill:#a9bad1;">Alarm</text>
      <text class="t" x="958" y="50" text-anchor="middle" style="font-size:19px;fill:#566a87;">🗑</text>
      <rect x="982" y="28" width="54" height="28" rx="14" fill="#3b4c66"/>
      <circle cx="997" cy="42" r="11" fill="#d9e1ee"/>
    </g>

    <!-- Alarm row 2 — disabled -->
    <g transform="translate(28 266)">
      <rect width="1044" height="88" rx="14" fill="#26354c" stroke="#385072"/>
      <rect x="0" y="12" width="7" height="62" rx="3.5" fill="#6f83a4"/>
      <text class="t" x="24" y="52" style="font-size:32px;fill:#f0f6ff;font-weight:700;letter-spacing:-1px;">02:00 - 02:30</text>
      <text class="t" x="26" y="76" style="font-size:18px;fill:#a9bad1;">Test Alarm</text>
      <text class="t" x="958" y="50" text-anchor="middle" style="font-size:19px;fill:#566a87;">🗑</text>
      <rect x="982" y="28" width="54" height="28" rx="14" fill="#3b4c66"/>
      <circle cx="997" cy="42" r="11" fill="#d9e1ee"/>
    </g>

    <!-- Alarm row 3 — enabled -->
    <g transform="translate(28 366)">
      <rect width="1044" height="88" rx="14" fill="#2a3a52" stroke="#3e5679"/>
      <rect x="0" y="12" width="7" height="62" rx="3.5" fill="#4c8dff"/>
      <text class="t" x="24" y="52" style="font-size:36px;fill:#f3f7ff;font-weight:700;letter-spacing:-1px;">09:27</text>
      <text class="t" x="26" y="76" style="font-size:18px;fill:#a9bad1;">Francis!  ⏰ Sun 09:27</text>
      <text class="t" x="958" y="50" text-anchor="middle" style="font-size:19px;fill:#566a87;">🗑</text>
      <rect x="982" y="28" width="54" height="28" rx="14" fill="#4c8dff"/>
      <circle cx="1022" cy="42" r="11" fill="#ffffff"/>
    </g>

    <!-- Bottom action zone — centred button maxWidth 400, gear right of button -->
    <rect x="0" y="736" width="1100" height="54" fill="#142132"/>
    <rect x="350" y="746" width="400" height="34" rx="8" fill="#4c8dff"/>
    <text class="t" x="550" y="769" text-anchor="middle" style="font-size:17px;fill:#fff;font-weight:700;">+ Add Alarm</text>
    <rect x="764" y="746" width="34" height="34" rx="8" fill="#1f334b" stroke="#345476"/>
    <text class="t" x="781" y="768" text-anchor="middle" style="font-size:17px;fill:#8fb8e8;">⚙</text>
  </g>

  <!-- Annotation: window shape -->
  <g transform="translate(48 160)">
    <rect width="172" height="180" rx="14" fill="#111c2f" stroke="#2e4362"/>
    <text class="t noteTitle" x="14" y="34">Window shape</text>
    <text class="t noteBody" x="14" y="58">Wider AR shown here</text>
    <text class="t noteBody" x="14" y="78">matches "potential new</text>
    <text class="t noteBody" x="14" y="98">default window shape"</text>
    <text class="t noteBody" x="14" y="118">screenshot. App owns</text>
    <text class="t noteBody" x="14" y="138">all chrome via</text>
    <text class="t noteBody" x="14" y="158">TitleBar.tsx.</text>
  </g>
  <line x1="220" y1="258" x2="248" y2="200" stroke="#4f6a8c" stroke-dasharray="4 4"/>

  <!-- Annotation: taskbar tab -->
  <g transform="translate(48 380)">
    <rect width="172" height="130" rx="14" fill="#111c2f" stroke="#2e4362"/>
    <text class="t noteTitle" x="14" y="34">OS taskbar tab</text>
    <text class="t noteBody" x="14" y="58">Active window entry</text>
    <text class="t noteBody" x="14" y="78">shown at bottom with</text>
    <text class="t noteBody" x="14" y="98">app icon + name,</text>
    <text class="t noteBody" x="14" y="118">accent border when active.</text>
  </g>
  <line x1="220" y1="444" x2="620" y2="930" stroke="#4f6a8c" stroke-dasharray="4 4"/>

  <!-- Annotation: window shadow -->
  <g transform="translate(48 550)">
    <rect width="172" height="110" rx="14" fill="#111c2f" stroke="#2e4362"/>
    <text class="t noteTitle" x="14" y="34">Window shadow</text>
    <text class="t noteBody" x="14" y="58">OS-composited drop</text>
    <text class="t noteBody" x="14" y="78">shadow. App does not</text>
    <text class="t noteBody" x="14" y="98">control this directly.</text>
  </g>
</svg>
