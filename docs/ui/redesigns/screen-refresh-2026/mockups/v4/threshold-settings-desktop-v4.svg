<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 960" width="1600" height="960">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1423"/>
      <stop offset="100%" stop-color="#121f34"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b283e"/>
      <stop offset="100%" stop-color="#162233"/>
    </linearGradient>
    <style><![CDATA[
      .t { font-family: "Avenir Next", "Nunito Sans", "Segoe UI", sans-serif; }
      .eyebrow { font-size: 14px; letter-spacing: 2px; fill: #ff8f5d; font-weight: 700; }
      .navLabel { font-size: 17px; fill: #c7d6ea; }
      .sectionTitle { font-size: 22px; fill: #deebfd; font-weight: 700; }
      .rowPrimary { font-size: 19px; fill: #dbe8fb; }
      .rowSub { font-size: 14px; fill: #8fa8c8; }
      .rowValue { font-size: 15px; fill: #8fa8c8; }
      .noteTitle { font-size: 19px; fill: #dbe8fb; font-weight: 700; }
      .noteBody { font-size: 15px; fill: #a7bad5; }
    ]]></style>
  </defs>

  <rect width="1600" height="960" fill="url(#bg)"/>
  <text class="t eyebrow" x="48" y="48">THRESHOLD REDESIGN V4 — SETTINGS DESKTOP</text>

  <!-- App window -->
  <g transform="translate(80 72)">
    <rect width="1000" height="780" rx="12" fill="url(#panel)" stroke="#2e4362"/>

    <!-- TitleBar.tsx -->
    <rect x="0" y="0" width="1000" height="32" rx="12" fill="#17253b"/>
    <rect x="0" y="20" width="1000" height="12" fill="#17253b"/>
    <text class="t" x="500" y="22" text-anchor="middle" style="font-size:13px;fill:#8faac8;font-weight:500;">Threshold</text>
    <circle cx="952" cy="16" r="8" fill="#2a3f5f"/>
    <text class="t" x="952" y="21" text-anchor="middle" style="font-size:11px;fill:#adc1dd;">−</text>
    <circle cx="978" cy="16" r="8" fill="#2a3f5f"/>
    <text class="t" x="978" y="21" text-anchor="middle" style="font-size:12px;fill:#adc1dd;">✕</text>

    <!-- Back + Settings heading -->
    <text class="t" x="36" y="70" style="font-size:22px;fill:#8fa8c8;">‹</text>
    <text class="t" x="62" y="70" style="font-size:28px;fill:#edf4ff;font-weight:700;">Settings</text>

    <!-- Left nav rail -->
    <g transform="translate(28 90)">
      <rect width="220" height="648" rx="14" fill="#1a273b" stroke="#2f4564"/>

      <!-- Active: Appearance -->
      <rect x="12" y="16" width="196" height="42" rx="10" fill="#4c8dff"/>
      <text class="t navLabel" x="104" y="43" text-anchor="middle" style="fill:#fff;font-weight:700;">Appearance</text>

      <!-- Inactive -->
      <rect x="12" y="68" width="196" height="42" rx="10" fill="#1f3050"/>
      <text class="t navLabel" x="104" y="95" text-anchor="middle">Alarm Settings</text>

      <rect x="12" y="120" width="196" height="42" rx="10" fill="#1f3050"/>
      <text class="t navLabel" x="104" y="147" text-anchor="middle">General</text>

      <rect x="12" y="172" width="196" height="42" rx="10" fill="#1f3050"/>
      <text class="t navLabel" x="104" y="199" text-anchor="middle">Developer</text>
    </g>

    <!-- Right detail panel — Appearance shown -->
    <g transform="translate(268 90)">
      <rect width="704" height="648" rx="14" fill="#223148" stroke="#365073"/>

      <text class="t sectionTitle" x="24" y="46">Appearance</text>

      <!-- Theme row -->
      <rect x="16" y="62" width="672" height="60" rx="10" fill="#1b2b43" stroke="#314e73"/>
      <text class="t rowPrimary" x="34" y="100">Theme</text>
      <text class="t rowValue" x="672" y="100" text-anchor="end">System (Auto)  ▾</text>

      <!-- Material You row — note: Android only, shown greyed on desktop -->
      <rect x="16" y="132" width="672" height="60" rx="10" fill="#192840" stroke="#2a3f5c"/>
      <text class="t" x="34" y="170" style="font-size:19px;fill:#566a87;">Use Material You</text>
      <text class="t rowSub" x="672" y="162" text-anchor="end">Android only</text>
      <text class="t rowSub" x="672" y="178" text-anchor="end">when theme is System</text>

      <!-- Force Dark Mode row -->
      <rect x="16" y="202" width="672" height="60" rx="10" fill="#1b2b43" stroke="#314e73"/>
      <text class="t rowPrimary" x="34" y="240">Force Dark Mode</text>
      <text class="t rowSub" x="34" y="256">Override system colour scheme</text>
      <!-- switch off -->
      <rect x="614" y="220" width="52" height="28" rx="14" fill="#2a3d58"/>
      <circle cx="626" cy="234" r="11" fill="#c5d2e4"/>

      <!-- Alarm Settings section inline (visible in detail area when scrolled or always shown) -->
      <text class="t sectionTitle" x="24" y="314">Alarm Settings</text>

      <rect x="16" y="326" width="326" height="56" rx="10" fill="#1b2b43" stroke="#314e73"/>
      <text class="t rowPrimary" x="34" y="362">Silence After</text>
      <text class="t rowValue" x="330" y="362" text-anchor="end">20 minutes  ▾</text>

      <rect x="358" y="326" width="330" height="56" rx="10" fill="#1b2b43" stroke="#314e73"/>
      <text class="t rowPrimary" x="376" y="362">Snooze Length</text>
      <text class="t rowValue" x="676" y="362" text-anchor="end">10 minutes  ›</text>

      <!-- General section inline -->
      <text class="t sectionTitle" x="24" y="424">General</text>
      <rect x="16" y="436" width="672" height="56" rx="10" fill="#1b2b43" stroke="#314e73"/>
      <text class="t rowPrimary" x="34" y="472">24-Hour Time</text>
      <text class="t rowSub" x="34" y="486">Use 24-hour format for time display</text>
      <rect x="608" y="454" width="52" height="28" rx="14" fill="#2a3d58"/>
      <circle cx="620" cy="468" r="11" fill="#c5d2e4"/>
    </g>
  </g>

  <!-- Annotation: nav rail is concept -->
  <g transform="translate(1122 130)">
    <rect width="206" height="140" rx="14" fill="#111c2f" stroke="#2e4362"/>
    <text class="t noteTitle" x="14" y="34">Left nav rail</text>
    <text class="t noteBody" x="14" y="58">Concept direction for</text>
    <text class="t noteBody" x="14" y="78">desktop. No code yet.</text>
    <text class="t noteBody" x="14" y="98">Developer section is</text>
    <text class="t noteBody" x="14" y="118">one of the nav tabs.</text>
  </g>
  <line x1="1122" y1="188" x2="1082" y2="230" stroke="#4f6a8c" stroke-dasharray="4 4"/>

  <!-- Annotation: Material You greyed on desktop -->
  <g transform="translate(1122 330)">
    <rect width="206" height="120" rx="14" fill="#111c2f" stroke="#2e4362"/>
    <text class="t noteTitle" x="14" y="34">Material You</text>
    <text class="t noteBody" x="14" y="58">Row shown greyed on</text>
    <text class="t noteBody" x="14" y="78">desktop — Android only.</text>
    <text class="t noteBody" x="14" y="98">No extraction on desktop.</text>
  </g>
  <line x1="1122" y1="388" x2="1082" y2="330" stroke="#4f6a8c" stroke-dasharray="4 4"/>

  <!-- Annotation: TitleBar -->
  <g transform="translate(1122 490)">
    <rect width="206" height="100" rx="14" fill="#111c2f" stroke="#2e4362"/>
    <text class="t noteTitle" x="14" y="34">TitleBar.tsx</text>
    <text class="t noteBody" x="14" y="58">32px app-drawn bar.</text>
    <text class="t noteBody" x="14" y="78">decorations: false.</text>
  </g>
  <line x1="1122" y1="518" x2="1082" y2="120" stroke="#4f6a8c" stroke-dasharray="4 4"/>
</svg>
