name: Release Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional release tag (for example v0.1.9). Leave blank to use apps/threshold/package.json version.'
        required: false
        type: string

permissions:
  contents: write
  packages: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-release-source:
    runs-on: ubuntu-24.04
    outputs:
      should_release: ${{ steps.resolve.outputs.should_release }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Resolve release trigger and tag
        id: resolve
        env:
          MANUAL_RELEASE_TAG: ${{ github.event.inputs.release_tag || '' }}
        run: |
          set -euo pipefail
          git fetch origin main

          ref_type="${GITHUB_REF_TYPE}"
          ref_name="${GITHUB_REF_NAME}"
          event_name="${GITHUB_EVENT_NAME}"

          if [ "$event_name" = "workflow_dispatch" ]; then
            if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
              echo "Manual run commit is not on origin/main; skipping release"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ -n "${MANUAL_RELEASE_TAG:-}" ]; then
              echo "Manual release override requested; using tag ${MANUAL_RELEASE_TAG}"
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "release_tag=${MANUAL_RELEASE_TAG}" >> "$GITHUB_OUTPUT"
            else
              version="$(node -p "require('./apps/threshold/package.json').version")"
              echo "Manual release override requested; using derived tag v$version"
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "release_tag=v$version" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          if [ "$ref_type" = "tag" ]; then
            if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
              echo "Tag commit is not on origin/main; skipping release"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Tag push on main history detected: $ref_name"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "release_tag=$ref_name" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$event_name" = "push" ] && [ "$ref_name" = "main" ]; then
            changed_files="$(git diff --name-only "${{ github.event.before }}" "${GITHUB_SHA}")"
            if echo "$changed_files" | grep -q '^apps/threshold/package.json$'; then
              version="$(node -p "require('./apps/threshold/package.json').version")"
              echo "Release candidate merged to main; using tag v$version"
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "release_tag=v$version" >> "$GITHUB_OUTPUT"
            else
              echo "Push to main is not a release merge; skipping release"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          echo "Unsupported release trigger context; skipping"
          echo "should_release=false" >> "$GITHUB_OUTPUT"

  build-desktop:
    needs: verify-release-source
    if: needs.verify-release-source.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform_label: linux
            arch_label: x64
            tauri_args: ''
            tauri_target: ''
            bundle_path: target/release/bundle/**
            artefact_name: desktop-linux-x64-artefacts
          - runner: ubuntu-24.04-arm
            platform_label: linux
            arch_label: arm64
            tauri_args: ''
            tauri_target: ''
            bundle_path: target/release/bundle/**
            artefact_name: desktop-linux-arm64-artefacts
          - runner: windows-latest
            platform_label: windows
            arch_label: x64
            tauri_args: --target x86_64-pc-windows-msvc
            tauri_target: x86_64-pc-windows-msvc
            bundle_path: target/x86_64-pc-windows-msvc/release/bundle/**
            artefact_name: desktop-windows-x64-artefacts
          - runner: windows-latest
            platform_label: windows
            arch_label: arm64
            tauri_args: --target aarch64-pc-windows-msvc
            tauri_target: aarch64-pc-windows-msvc
            bundle_path: target/aarch64-pc-windows-msvc/release/bundle/**
            artefact_name: desktop-windows-arm64-artefacts
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: 'pnpm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.tauri_target != ''
        run: rustup target add ${{ matrix.tauri_target }}

      - name: Install Linux system dependencies
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            xdg-utils \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-bad \
            fonts-noto-color-emoji \
            pkg-config \
            unzip

      - name: Cache Rust
        uses: swatinem/rust-cache@v2.8.2

      - name: Build vendored notification plugin package
        run: |
          pnpm --dir vendor/tauri-plugins-workspace/plugins/notification install
          pnpm --dir vendor/tauri-plugins-workspace/plugins/notification build

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app
        id: build_tauri
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: "true"
        with:
          projectPath: apps/threshold
          includeUpdaterJson: false
          tauriScript: "pnpm tauri"
          args: ${{ matrix.tauri_args }}

      - name: Upload desktop artefacts
        id: upload_desktop_artefacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artefact_name }}
          path: |
            ${{ matrix.bundle_path }}
          if-no-files-found: error

      - name: Summarise desktop build
        if: always()
        env:
          BUILD_RESULT: ${{ steps.build_tauri.outcome }}
          UPLOAD_RESULT: ${{ steps.upload_desktop_artefacts.outcome }}
          RELEASE_TAG: ${{ needs.verify-release-source.outputs.release_tag }}
        run: |
          {
            echo "## Desktop Build Summary"
            echo ""
            echo "- Platform: \`${{ matrix.platform_label }}\`"
            echo "- Architecture: \`${{ matrix.arch_label }}\`"
            echo "- Build and package: \`${BUILD_RESULT}\`"
            echo "- Upload artefacts: \`${UPLOAD_RESULT}\`"
            echo "- Release tag: \`${RELEASE_TAG}\`"
            echo "- Release URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
            echo "- Run URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } >> "${GITHUB_STEP_SUMMARY}"

  build-android:
    runs-on: ubuntu-24.04
    needs: verify-release-source
    if: needs.verify-release-source.outputs.should_release == 'true'
    defaults:
      run:
        shell: bash
    container:
      image: ghcr.io/${{ github.repository }}/ci-base:latest
      options: --user 0
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Normalise workspace permissions
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          if command -v sudo >/dev/null 2>&1; then
            sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE" || true
          else
            chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE" || true
          fi

      - name: Add Rust Android targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            i686-linux-android \
            x86_64-linux-android

      - name: Cache Rust
        uses: swatinem/rust-cache@v2.8.2

      - name: Build vendored notification plugin package
        run: |
          pnpm --dir vendor/tauri-plugins-workspace/plugins/notification install
          pnpm --dir vendor/tauri-plugins-workspace/plugins/notification build

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Android signing
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${ANDROID_UPLOAD_KEYSTORE_BASE64:-}" ] || [ -z "${ANDROID_UPLOAD_KEY_ALIAS:-}" ] || [ -z "${ANDROID_UPLOAD_KEYSTORE_PASSWORD:-}" ]; then
            echo "Missing Android signing secrets. Expected: ANDROID_UPLOAD_KEYSTORE_BASE64, ANDROID_UPLOAD_KEY_ALIAS, ANDROID_UPLOAD_KEYSTORE_PASSWORD" >&2
            exit 1
          fi

          mkdir -p .ci/signing

          key_alias_raw="$(printf '%s' "${ANDROID_UPLOAD_KEY_ALIAS:-}" | tr -d '\r\n')"
          keystore_password_raw="$(printf '%s' "${ANDROID_UPLOAD_KEYSTORE_PASSWORD:-}" | tr -d '\r\n')"

          # Remove accidental wrapping quotes from copied secret values.
          if [ "${key_alias_raw#\"}" != "$key_alias_raw" ] && [ "${key_alias_raw%\"}" != "$key_alias_raw" ]; then
            key_alias_raw="${key_alias_raw#\"}"
            key_alias_raw="${key_alias_raw%\"}"
          fi
          if [ "${key_alias_raw#\'}" != "$key_alias_raw" ] && [ "${key_alias_raw%\'}" != "$key_alias_raw" ]; then
            key_alias_raw="${key_alias_raw#\'}"
            key_alias_raw="${key_alias_raw%\'}"
          fi
          if [ "${keystore_password_raw#\"}" != "$keystore_password_raw" ] && [ "${keystore_password_raw%\"}" != "$keystore_password_raw" ]; then
            keystore_password_raw="${keystore_password_raw#\"}"
            keystore_password_raw="${keystore_password_raw%\"}"
          fi
          if [ "${keystore_password_raw#\'}" != "$keystore_password_raw" ] && [ "${keystore_password_raw%\'}" != "$keystore_password_raw" ]; then
            keystore_password_raw="${keystore_password_raw#\'}"
            keystore_password_raw="${keystore_password_raw%\'}"
          fi

          key_alias_trimmed="$(printf '%s' "$key_alias_raw" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
          keystore_password_trimmed="$(printf '%s' "$keystore_password_raw" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"

          key_alias="$key_alias_raw"
          keystore_password="$keystore_password_raw"

          if [ -z "${key_alias:-}" ] || [ -z "${keystore_password:-}" ]; then
            echo "Android signing alias/password resolved to empty values after trimming CR/LF characters" >&2
            exit 1
          fi

          keystore_b64="${ANDROID_UPLOAD_KEYSTORE_BASE64:-}"
          keystore_b64="${keystore_b64#data:*;base64,}"
          keystore_b64="$(printf '%s' "$keystore_b64" | tr -d '\r\n\t ')"

          # Support both standard and URL-safe base64 encodings.
          if ! printf '%s' "$keystore_b64" | base64 --decode > .ci/signing/upload-keystore.jks 2>/dev/null; then
            keystore_b64_urlsafe="$(printf '%s' "$keystore_b64" | tr '_-' '/+')"
            padding=$(( (4 - ${#keystore_b64_urlsafe} % 4) % 4 ))
            if [ "$padding" -gt 0 ]; then
              keystore_b64_urlsafe="${keystore_b64_urlsafe}$(printf '=%.0s' $(seq 1 "$padding"))"
            fi
            if ! printf '%s' "$keystore_b64_urlsafe" | base64 --decode > .ci/signing/upload-keystore.jks 2>/dev/null; then
              echo "Could not decode ANDROID_UPLOAD_KEYSTORE_BASE64 into a valid binary keystore payload" >&2
              exit 1
            fi
          fi

          chmod 600 .ci/signing/upload-keystore.jks

          # Validate keystore readability first (exact value), then fallback to trimmed value.
          if keytool -list \
            -keystore .ci/signing/upload-keystore.jks \
            -storepass "$keystore_password" >/dev/null 2>&1; then
            :
          elif [ "$keystore_password" != "$keystore_password_trimmed" ] && keytool -list \
            -keystore .ci/signing/upload-keystore.jks \
            -storepass "$keystore_password_trimmed" >/dev/null 2>&1; then
            keystore_password="$keystore_password_trimmed"
            echo "Warning: using trimmed Android store password after whitespace fallback during pre-flight validation" >&2
          else
            echo "Decoded Android keystore is unreadable with the provided store password" >&2
            exit 1
          fi

          # Alias validation is a pre-flight warning only; Gradle signing remains the source of truth.
          if ! keytool -list \
            -keystore .ci/signing/upload-keystore.jks \
            -storepass "$keystore_password" \
            -alias "$key_alias" >/dev/null 2>&1; then
            if [ "$key_alias" != "$key_alias_trimmed" ] && keytool -list \
              -keystore .ci/signing/upload-keystore.jks \
              -storepass "$keystore_password" \
              -alias "$key_alias_trimmed" >/dev/null 2>&1; then
              key_alias="$key_alias_trimmed"
              echo "Warning: using trimmed Android key alias after whitespace fallback during pre-flight validation" >&2
            else
              echo "Warning: alias $key_alias was not validated during pre-flight check; continuing and deferring to Gradle signing checks" >&2
            fi
          fi

          mkdir -p apps/threshold/src-tauri/gen/android
          {
            printf 'keyAlias=%s\n' "$key_alias"
            printf 'password=%s\n' "$keystore_password"
            printf 'storeFile=%s\n' "${GITHUB_WORKSPACE}/.ci/signing/upload-keystore.jks"
          } > apps/threshold/src-tauri/gen/android/keystore.properties

          {
            printf 'keyAlias=%s\n' "$key_alias"
            printf 'password=%s\n' "$keystore_password"
            printf 'storeFile=%s\n' "${GITHUB_WORKSPACE}/.ci/signing/upload-keystore.jks"
          } > apps/threshold-wear/keystore.properties

      - name: Build Android phone app
        id: build_android_phone
        run: pnpm build:android

      - name: Build Android Wear app
        id: build_android_wear
        run: |
          ./apps/threshold-wear/gradlew --project-dir apps/threshold-wear bundleRelease assembleRelease

      - name: Verify Android release signatures
        id: verify_android_signatures
        run: |
          set -euo pipefail
          mapfile -d '' artefacts < <(find apps/threshold/src-tauri/gen/android/app/build/outputs apps/threshold-wear/build/outputs -type f \( -name "*.aab" -o -name "*.apk" \) -print0)
          if [ "${#artefacts[@]}" -eq 0 ]; then
            echo "No Android release artefacts found to verify" >&2
            exit 1
          fi

          for artefact in "${artefacts[@]}"; do
            echo "Verifying signature: $artefact"
            jarsigner -verify -certs "$artefact" >/dev/null
          done

      - name: Collect Android release artefacts
        id: collect_android_artefacts
        run: |
          set -euo pipefail
          mkdir -p release-assets/android

          # Phone version metadata
          tauri_props="apps/threshold/src-tauri/gen/android/app/tauri.properties"
          if [ ! -f "$tauri_props" ]; then
            echo "Missing phone tauri.properties at $tauri_props" >&2
            exit 1
          fi
          phone_version_name=$(grep "^tauri.android.versionName=" "$tauri_props" | cut -d'=' -f2)
          phone_version_code=$(grep "^tauri.android.versionCode=" "$tauri_props" | cut -d'=' -f2)
          if [ -z "${phone_version_name:-}" ] || [ -z "${phone_version_code:-}" ]; then
            echo "Could not parse phone version metadata from $tauri_props" >&2
            exit 1
          fi

          # Wear version metadata
          wear_gradle="apps/threshold-wear/build.gradle.kts"
          wear_version_name=$(grep "versionName" "$wear_gradle" | head -n1 | sed 's/.*"\(.*\)".*/\1/')
          wear_version_code=$(grep "versionCode" "$wear_gradle" | head -n1 | sed 's/[^0-9]//g')
          if [ -z "${wear_version_name:-}" ] || [ -z "${wear_version_code:-}" ]; then
            echo "Could not parse wear version metadata from $wear_gradle" >&2
            exit 1
          fi

          # Phone artefacts
          phone_aab=$(find apps/threshold/src-tauri/gen/android/app/build/outputs -type f -name "*.aab" | sort | head -n1 || true)
          phone_apk=$(find apps/threshold/src-tauri/gen/android/app/build/outputs -type f -name "*.apk" | sort | head -n1 || true)
          if [ -z "${phone_aab:-}" ] || [ -z "${phone_apk:-}" ]; then
            echo "Missing phone AAB/APK output" >&2
            exit 1
          fi
          cp "$phone_aab" "release-assets/android/threshold-phone-v${phone_version_name}-${phone_version_code}.aab"
          cp "$phone_apk" "release-assets/android/threshold-phone-v${phone_version_name}-${phone_version_code}.apk"

          # Wear artefacts
          wear_aab=$(find apps/threshold-wear/build/outputs -type f -name "*.aab" | sort | head -n1 || true)
          wear_apk=$(find apps/threshold-wear/build/outputs -type f -name "*.apk" | sort | head -n1 || true)
          if [ -z "${wear_aab:-}" ] || [ -z "${wear_apk:-}" ]; then
            echo "Missing wear AAB/APK output" >&2
            exit 1
          fi
          cp "$wear_aab" "release-assets/android/threshold-wear-v${wear_version_name}-${wear_version_code}.aab"
          cp "$wear_apk" "release-assets/android/threshold-wear-v${wear_version_name}-${wear_version_code}.apk"

          # Wear mapping only (phone mapping intentionally excluded)
          wear_mapping=$(find apps/threshold-wear/build/outputs -type f -name "mapping.txt" | sort | head -n1 || true)
          if [ -n "${wear_mapping:-}" ]; then
            cp "$wear_mapping" "release-assets/android/wear-mapping-v${wear_version_name}-${wear_version_code}.txt"
          fi

          # Phone native debug symbols zip (if unstripped symbols exist)
          symbols_dir=$(find apps/threshold/src-tauri/gen/android/app/build/intermediates/merged_native_libs/universalRelease -type d -name "lib" 2>/dev/null | head -n1 || true)
          if [ -n "${symbols_dir:-}" ] && [ -d "$symbols_dir" ]; then
            sample_lib=$(find "$symbols_dir" -name "libthreshold.so" | head -n1 || true)
            if [ -n "${sample_lib:-}" ] && file "$sample_lib" | grep -q "not stripped"; then
              (
                cd "$symbols_dir"
                zip -r -q "$GITHUB_WORKSPACE/release-assets/android/threshold-phone-native-debug-symbols-v${phone_version_name}-${phone_version_code}.zip" arm64-v8a/ armeabi-v7a/ x86/ x86_64/ || true
              )
            fi
          fi

          ls -lah release-assets/android

      - name: Upload Android artefacts
        id: upload_android_artefacts
        uses: actions/upload-artifact@v7
        with:
          name: android-artefacts
          path: |
            release-assets/android/**
          if-no-files-found: error

      - name: Summarise Android build
        if: always()
        env:
          PHONE_BUILD_RESULT: ${{ steps.build_android_phone.outcome }}
          WEAR_BUILD_RESULT: ${{ steps.build_android_wear.outcome }}
          VERIFY_RESULT: ${{ steps.verify_android_signatures.outcome }}
          COLLECT_RESULT: ${{ steps.collect_android_artefacts.outcome }}
          UPLOAD_RESULT: ${{ steps.upload_android_artefacts.outcome }}
          RELEASE_TAG: ${{ needs.verify-release-source.outputs.release_tag }}
        run: |
          set -euo pipefail

          android_count=0
          if [ -d release-assets/android ]; then
            android_count=$(find release-assets/android -type f | wc -l | tr -d ' ')
          fi

          {
            echo "## Android Build Summary"
            echo ""
            echo "- Phone build: \`${PHONE_BUILD_RESULT}\`"
            echo "- Wear build: \`${WEAR_BUILD_RESULT}\`"
            echo "- Signature verification: \`${VERIFY_RESULT}\`"
            echo "- Collect artefacts: \`${COLLECT_RESULT}\`"
            echo "- Upload artefacts: \`${UPLOAD_RESULT}\`"
            echo "- Android assets staged: ${android_count}"
            echo "- Release tag: \`${RELEASE_TAG}\`"
            echo "- Release URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
            echo "- Run URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo ""
            echo "### Android assets"
            if [ "${android_count}" -gt 0 ]; then
              find release-assets/android -type f | sort | sed 's#^#- `#; s#$#`#'
            else
              echo "- _No Android assets staged_"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Cleanup signing files
        if: always()
        run: |
          rm -f .ci/signing/upload-keystore.jks
          rm -f apps/threshold/src-tauri/gen/android/keystore.properties
          rm -f apps/threshold-wear/keystore.properties

  publish-release:
    runs-on: ubuntu-24.04
    needs: [verify-release-source, build-desktop, build-android]
    if: needs.verify-release-source.outputs.should_release == 'true'
    steps:
      - name: Download desktop artefacts
        uses: actions/download-artifact@v8
        with:
          pattern: desktop-*-artefacts
          path: release-assets/desktop
          merge-multiple: true

      - name: Download Android artefacts
        uses: actions/download-artifact@v8
        with:
          name: android-artefacts
          path: release-assets/android

      - name: Prepare release upload files
        run: |
          set -euo pipefail
          mkdir -p release-assets/publish

          mapfile -t desktop_files < <(find release-assets/desktop -type f \( \
            -name "*.AppImage" -o \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "*.msi" -o \
            -name "*setup*.exe" \
          \) | sort)

          mapfile -t android_files < <(find release-assets/android -type f \( \
            -name "*.aab" -o \
            -name "*.apk" -o \
            -name "*.txt" -o \
            -name "*.zip" \
          \) | sort)

          if [ "${#desktop_files[@]}" -eq 0 ] && [ "${#android_files[@]}" -eq 0 ]; then
            echo "No release artefacts found to publish" >&2
            exit 1
          fi

          for file in "${desktop_files[@]}" "${android_files[@]}"; do
            [ -n "${file:-}" ] || continue
            cp "$file" release-assets/publish/
          done

          echo "Prepared release upload files:"
          ls -lah release-assets/publish

      - name: Remove existing release assets for tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.verify-release-source.outputs.release_tag }}
        run: |
          set -euo pipefail

          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG does not exist yet; skipping asset cleanup."
            exit 0
          fi

          mapfile -t asset_ids < <(
            gh release view "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --json assets \
              --jq '.assets[].id'
          )

          if [ "${#asset_ids[@]}" -eq 0 ]; then
            echo "No existing assets to remove for release $RELEASE_TAG."
            exit 0
          fi

          for asset_id in "${asset_ids[@]}"; do
            echo "Deleting existing release asset id $asset_id"
            gh api \
              --method DELETE \
              "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}" >/dev/null
          done

          echo "Existing release assets cleared for $RELEASE_TAG."

      - name: Publish GitHub release
        id: publish_release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ needs.verify-release-source.outputs.release_tag }}
          name: Threshold ${{ needs.verify-release-source.outputs.release_tag }}
          generate_release_notes: true
          files: |
            release-assets/publish/*

      - name: Summarise release publish
        if: always()
        env:
          RELEASE_TAG: ${{ needs.verify-release-source.outputs.release_tag }}
          PUBLISH_RESULT: ${{ steps.publish_release.outcome }}
        run: |
          set -euo pipefail

          desktop_count=$(find release-assets/desktop -type f | wc -l | tr -d ' ')
          android_count=$(find release-assets/android -type f | wc -l | tr -d ' ')
          upload_count=$(find release-assets/publish -type f | wc -l | tr -d ' ')

          {
            echo "## Release Publish Summary"
            echo ""
            echo "- Publish result: \`${PUBLISH_RESULT}\`"
            echo "- Release tag: \`${RELEASE_TAG}\`"
            echo "- Release URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
            echo "- Assets discovered: ${desktop_count} desktop, ${android_count} Android"
            echo "- Assets uploaded: ${upload_count}"
            echo "- Run URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo ""
            echo "### Uploaded assets"
            find release-assets/publish -type f | sort | sed 's#^#- `#; s#$#`#'
            echo ""
            echo "### Desktop assets discovered"
            find release-assets/desktop -type f | sort | sed 's#^#- `#; s#$#`#'
            echo ""
            echo "### Android assets discovered"
            find release-assets/android -type f | sort | sed 's#^#- `#; s#$#`#'
          } >> "${GITHUB_STEP_SUMMARY}"
